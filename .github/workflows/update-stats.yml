name: Update GitHub Profile Stats

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SVG update script
        run: |
          chmod +x scripts/update_stats.sh
          ./scripts/update_stats.sh

      - name: Generate Repo List via Bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="naranyala"
          echo "Fetching repos for $USERNAME..."
          
          # 1. Fetch repo links, sort alphabetically, and save to a temp file
          curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/users/$USERNAME/repos?per_page=100&sort=updated" | \
          jq -r '.[] | "[\(.name)](https://github.com/\($USERNAME)/\(.name))"' | sort > repos_list.txt

          if [ ! -s repos_list.txt ]; then
            echo "Error: Failed to fetch or parse repositories (repos_list.txt is empty)."
            exit 1
          fi

          echo "Updating README.md..."
          
          # 2. Use Python to replace the content between the tags
          python3 -c "
          import re
          import sys

          readme_path = 'README.md'
          list_path = 'repos_list.txt'

          try:
              with open(list_path, 'r') as f:
                  lines = [line.strip() for line in f.readlines() if line.strip()]

              # Create the Markdown table
              table_header = '| No. | Link |'
              table_divider = '| :--- | :--- |'
              table_rows = [f'| {i} | {line} |' for i, line in enumerate(lines, 1)]
              table_content = '\n'.join([table_header, table_divider] + table_rows)
              
              # Wrap in collapsible details section
              wrapped_content = f'<details>\n<summary>Click to see my repositories 🚀</summary>\n\n{table_content}\n\n</details>'
              
              new_block = f'<!-- REPOS_LIST_START -->\n{wrapped_content}\n<!-- REPOS_LIST_END -->'

              with open(readme_path, 'r') as f:
                  content = f.read()

              pattern = r'<!-- REPOS_LIST_START -->.*?<!-- REPOS_LIST_END -->'
              
              if re.search(pattern, content, re.DOTALL):
                  updated_content = re.sub(pattern, new_block, content, flags=re.DOTALL)
                  with open(readme_path, 'w') as f:
                      f.write(updated_content)
                  print('Successfully updated README.md with collapsible table')
              else:
                  print('Error: Could not find the REPOS_LIST tags in README.md')
                  sys.exit(1)
          except Exception as e:
              print(f'Error: {e}')
              sys.exit(1)
          "

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile/*.svg README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile stats and repo list" && git push)
