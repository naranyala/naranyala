name: Update GitHub Profile Stats

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SVG update script
        run: |
          chmod +x scripts/update_stats.sh
          ./scripts/update_stats.sh

      - name: Generate Repo List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/update_repos.sh
          ./scripts/update_repos.sh

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile/*.svg README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update profile stats and repo list" && git push)
